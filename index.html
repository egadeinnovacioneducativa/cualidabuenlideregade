<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cualidades de un Buen Líder</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8fafc;
            overflow-x: hidden;
        }
        .grid-bg {
            background-image: radial-gradient(#003399 1px, transparent 1px);
            background-size: 24px 24px;
            opacity: 0.03;
        }
        .perspective-1000 { perspective: 1000px; }
        .preserve-3d { transform-style: preserve-3d; }
        .backface-hidden { backface-visibility: hidden; }
        .rotate-y-180 { transform: rotateY(180deg); }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in { animation: fadeIn 0.5s ease-out forwards; }

        @keyframes bounceIn {
            0% { transform: scale(0.3); opacity: 0; }
            50% { transform: scale(1.05); opacity: 1; }
            70% { transform: scale(0.9); }
            100% { transform: scale(1); }
        }
        .animate-bounce-in { animation: bounceIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
        
        .card-used {
            opacity: 0.4;
            filter: grayscale(0.5);
            border: 2px dashed #cbd5e1;
        }

        textarea {
            resize: none;
            overflow: hidden;
            min-height: 2.5rem;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // SVG Icons
        const IconChevronRight = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m9 18 6-6-6-6"/></svg>;
        const IconCheck = ({ size = 20, className = "" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M20 6 9 17l-5-5"/></svg>;
        const IconX = ({ size = 20, className = "" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>;
        const IconHeart = ({ size = 20, className = "", fill = "none" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill={fill} stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z"/></svg>;
        const IconRotateCcw = () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>;
        const IconTrophy = () => <svg xmlns="http://www.w3.org/2000/svg" width="80" height="80" viewBox="0 0 24 24" fill="none" stroke="#eab308" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"/><path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"/><path d="M4 22h16"/><path d="M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22"/><path d="M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22"/><path d="M18 2H6v7a6 6 0 0 0 12 0V2Z"/></svg>;

        const LOGO_URL = "https://image.admisiones.tec.mx/lib/fe2b11747364057f721176/m/1/b910ad21-1913-4ce0-8f35-38c908814125.png";

        const QUALITIES = [
            { id: 'integridad', text: 'Integridad', color: 'bg-green-500', category: 'Verde', def: 'Actuar con honestidad y principios morales sólidos en todo momento.' },
            { id: 'valentia', text: 'Valentía', color: 'bg-green-500', category: 'Verde', def: 'Enfrentar desafíos y tomar decisiones difíciles con determinación.' },
            { id: 'gratitud', text: 'Gratitud', color: 'bg-green-500', category: 'Verde', def: 'Reconocer y valorar genuinamente las contribuciones de los demás.' },
            { id: 'autoconciencia', text: 'Autoconciencia', color: 'bg-blue-500', category: 'Azul', def: 'Conocer profundamente las propias fortalezas, debilidades y emociones.' },
            { id: 'aprendizaje', text: 'Capacidad de aprendizaje', color: 'bg-blue-500', category: 'Azul', def: 'Apertura constante para adquirir nuevos conocimientos y habilidades.' },
            { id: 'resiliencia', text: 'Resiliencia', color: 'bg-blue-500', category: 'Azul', def: 'Capacidad para recuperarse de la adversidad y aprender del fracaso.' },
            { id: 'respeto', text: 'Respeto', color: 'bg-orange-500', category: 'Naranja', def: 'Tratar a todos con dignidad y valorar las perspectivas diversas.' },
            { id: 'compasion', text: 'Compasión', color: 'bg-orange-500', category: 'Naranja', def: 'Sensibilidad ante el sufrimiento de otros y deseo de ayudar.' },
            { id: 'comunicacion', text: 'Comunicación', color: 'bg-orange-500', category: 'Naranja', def: 'Transmitir ideas con claridad y practicar la escucha activa.' },
            { id: 'vision', text: 'Visión', color: 'bg-pink-500', category: 'Rosa', def: 'Capacidad de imaginar y planificar un futuro inspirador.' },
            { id: 'colaboracion', text: 'Colaboración', color: 'bg-pink-500', category: 'Rosa', def: 'Trabajar conjuntamente con otros para alcanzar una meta común.' },
            { id: 'influencia', text: 'Influencia', color: 'bg-pink-500', category: 'Rosa', def: 'Inspirar y motivar a otros a través del ejemplo y la persuasión.' },
            { id: 'comodin', text: 'Comodín', color: 'bg-gray-500', category: 'Gris', def: 'Cualidad adicional que consideres fundamental y no esté en la lista.' },
        ];

        const AutoExpandingTextarea = ({ value, onChange, placeholder, className }) => {
            const textareaRef = useRef(null);
            useEffect(() => {
                const textarea = textareaRef.current;
                textarea.style.height = 'auto';
                textarea.style.height = textarea.scrollHeight + 'px';
            }, [value]);
            return (
                <textarea
                    ref={textareaRef}
                    rows="1"
                    value={value}
                    onChange={onChange}
                    placeholder={placeholder}
                    className={className}
                />
            );
        };

        const App = () => {
            const [step, setStep] = useState(1);
            const [selections, setSelections] = useState([null, null, null, null, null]);
            const [wildcardValue, setWildcardValue] = useState("");
            const [score, setScore] = useState(0);
            
            const [flippedBank, setFlippedBank] = useState({});
            const [flippedPriority, setFlippedPriority] = useState({});
            
            const [iconMapping, setIconMapping] = useState({});
            const [usedIcons, setUsedIcons] = useState({ check: 0, x: 0, heart: 0 });
            const [improvementPlan, setImprovementPlan] = useState({ quality: '', action1: '', action2: '', action3: '' });
            const [showFinalModal, setShowFinalModal] = useState(false);

            const calculateScore = () => {
                const selectedQualities = selections.filter(s => s !== null);
                const uniqueCategories = new Set();
                let wildcardBonus = 0;
                selectedQualities.forEach(q => {
                    if (q.category === 'Gris') wildcardBonus = 2;
                    else uniqueCategories.add(q.category);
                });
                setScore(uniqueCategories.size + wildcardBonus);
                setStep(4);
            };

            const toggleFlipBank = (id, e) => {
                if (e) e.stopPropagation();
                setFlippedBank(prev => ({ ...prev, [id]: !prev[id] }));
            };

            const toggleFlipPriority = (id, e) => {
                if (e) e.stopPropagation();
                setFlippedPriority(prev => ({ ...prev, [id]: !prev[id] }));
            };

            const handleDragStart = (e, quality) => {
                e.dataTransfer.setData("quality", JSON.stringify(quality));
            };

            const handleDrop = (e, targetIndex) => {
                e.preventDefault();
                const quality = JSON.parse(e.dataTransfer.getData("quality"));
                
                let newList = selections.filter(s => s !== null);
                const oldIndex = newList.findIndex(s => s.id === quality.id);

                if (oldIndex !== -1) {
                    newList.splice(oldIndex, 1);
                }
                
                newList.splice(targetIndex, 0, quality);
                
                const final = newList.slice(0, 5);
                while (final.length < 5) final.push(null);
                
                setSelections(final);
            };

            // Icon Drag and Drop handlers for Step 6
            const handleIconDragStart = (e, iconType) => {
                e.dataTransfer.setData("iconType", iconType);
            };

            const handleIconDrop = (e, qualityId) => {
                e.preventDefault();
                const iconType = e.dataTransfer.getData("iconType");
                
                // Limits: Check (3), X (3), Heart (1)
                const limit = iconType === 'heart' ? 1 : 3;
                if (usedIcons[iconType] >= limit && iconMapping[qualityId] !== iconType) return;

                const oldIcon = iconMapping[qualityId];
                const newUsedIcons = { ...usedIcons };
                
                if (oldIcon) {
                    newUsedIcons[oldIcon] = Math.max(0, newUsedIcons[oldIcon] - 1);
                }
                
                setIconMapping(prev => ({ ...prev, [qualityId]: iconType }));
                newUsedIcons[iconType] = (newUsedIcons[iconType] || 0) + 1;
                setUsedIcons(newUsedIcons);
            };

            const isSelected = (id) => selections.some(s => s && s.id === id);

            const renderScreen = () => {
                switch(step) {
                    case 1:
                        return (
                            <div className="flex flex-col items-center justify-center h-full text-center animate-fade-in">
                                <h1 className="text-5xl font-black text-[#003399] mb-8 leading-tight">
                                    Cualidades de un <br/><span className="text-blue-600">Buen Líder</span>
                                </h1>
                                <div className="w-24 h-1 bg-blue-600 rounded-full mb-12"></div>
                                <button onClick={() => setStep(2)} className="bg-[#003399] hover:bg-blue-800 text-white px-10 py-4 rounded-full font-bold transition-all transform hover:scale-105 shadow-xl flex items-center gap-2">
                                    Comenzar Actividad <IconChevronRight />
                                </button>
                            </div>
                        );
                    
                    case 2:
                        return (
                            <div className="max-w-2xl mx-auto py-10 animate-fade-in">
                                <h2 className="text-3xl font-bold text-[#003399] mb-6">Instrucciones de la primera parte</h2>
                                <div className="bg-white p-8 rounded-2xl shadow-xl border-l-8 border-blue-600 space-y-4">
                                    <p className="text-lg text-gray-700">Del listado de las cualidades esenciales de un líder efectivo, selecciona las <strong>5</strong> que consideres más importantes.</p>
                                    <p className="text-lg text-gray-700">Colócalas en orden de importancia.</p>
                                    <p className="text-lg text-gray-700 italic">Al reverso de cada cualidad podrás encontrar una breve definición.</p>
                                    <p className="text-lg text-gray-700">Si consideras que falta una, puedes usar el comodín.</p>
                                </div>
                                <div className="mt-10 flex justify-end">
                                    <button onClick={() => setStep(3)} className="bg-[#003399] text-white px-8 py-3 rounded-xl font-bold hover:bg-blue-800 flex items-center gap-2 shadow-lg">
                                        Continuar <IconChevronRight />
                                    </button>
                                </div>
                            </div>
                        );

                    case 3:
                        const hasWildcard = selections.some(s => s && s.id === 'comodin');
                        return (
                            <div className="w-full max-w-6xl flex flex-col md:flex-row gap-8 py-4 animate-fade-in">
                                <div className="md:w-3/5">
                                    <h3 className="text-xl font-bold text-[#003399] mb-6 border-b pb-2">Listado de Cualidades</h3>
                                    <div className="grid grid-cols-3 gap-3 mb-6">
                                        {QUALITIES.filter(q => q.id !== 'comodin').map(q => (
                                            <div key={q.id} 
                                                draggable={true} 
                                                onDragStart={(e) => handleDragStart(e, q)}
                                                onClick={(e) => toggleFlipBank(q.id, e)}
                                                className={`relative h-24 perspective-1000 ${isSelected(q.id) ? 'card-used cursor-pointer' : 'cursor-grab active:cursor-grabbing'}`}>
                                                <div className={`relative w-full h-full transition-transform duration-500 preserve-3d ${flippedBank[q.id] ? 'rotate-y-180' : ''}`}>
                                                    <div className={`absolute inset-0 backface-hidden ${q.color} text-white p-3 rounded-xl shadow-md flex items-center justify-center text-center font-bold text-sm select-none`}>
                                                        {q.text}
                                                    </div>
                                                    <div className="absolute inset-0 backface-hidden rotate-y-180 bg-gray-800 text-white p-2 rounded-xl shadow-md flex items-center justify-center text-center text-[10px] leading-tight select-none">
                                                        {q.def}
                                                    </div>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                    <div draggable={true} 
                                        onDragStart={(e) => handleDragStart(e, QUALITIES.find(q => q.id === 'comodin'))}
                                        onClick={(e) => toggleFlipBank('comodin', e)}
                                        className={`relative w-1/3 mx-auto h-20 perspective-1000 ${isSelected('comodin') ? 'card-used cursor-pointer' : 'cursor-grab'}`}>
                                        <div className={`relative w-full h-full transition-transform duration-500 preserve-3d ${flippedBank['comodin'] ? 'rotate-y-180' : ''}`}>
                                            <div className="absolute inset-0 backface-hidden bg-gray-500 text-white p-3 rounded-xl shadow-md flex items-center justify-center font-bold text-sm select-none">Comodín</div>
                                            <div className="absolute inset-0 backface-hidden rotate-y-180 bg-gray-800 text-white p-2 rounded-xl shadow-md flex items-center justify-center text-center text-xs select-none">Cualidad adicional de tu elección.</div>
                                        </div>
                                    </div>
                                </div>

                                <div className="md:w-2/5 flex flex-col bg-white p-6 rounded-3xl shadow-xl border border-blue-50">
                                    <h3 className="text-xl font-bold text-[#003399] mb-4">Top 5 Prioridades</h3>
                                    <div className="space-y-3 flex-grow">
                                        {selections.map((item, idx) => (
                                            <div key={idx} 
                                                onDragOver={(e) => e.preventDefault()} 
                                                onDrop={(e) => handleDrop(e, idx)}
                                                className={`h-14 border-2 border-dashed rounded-xl flex items-center px-4 transition-all relative ${item ? 'border-solid border-blue-600 bg-blue-50 cursor-pointer' : 'border-gray-200 bg-gray-50'}`}
                                                onClick={() => item && toggleFlipPriority(item.id)}
                                                draggable={!!item}
                                                onDragStart={(e) => item && handleDragStart(e, item)}
                                            >
                                                <span className="w-8 h-8 rounded-full bg-blue-600 text-white flex items-center justify-center font-bold mr-3 text-xs shrink-0">{idx + 1}</span>
                                                {item ? (
                                                    <div className="flex items-center justify-between w-full relative perspective-1000 h-full">
                                                        <div className={`relative w-full h-full transition-transform duration-500 preserve-3d ${flippedPriority[item.id] ? 'rotate-y-180' : ''}`}>
                                                            <div className="absolute inset-0 backface-hidden flex items-center justify-between">
                                                                <span className="font-bold text-gray-800 truncate pr-4">
                                                                    {item.id === 'comodin' && wildcardValue ? wildcardValue : item.text}
                                                                </span>
                                                                <button onClick={(e) => { e.stopPropagation(); const n = [...selections]; n[idx] = null; setSelections(n); }} className="text-gray-400 hover:text-red-500 shrink-0"><IconRotateCcw/></button>
                                                            </div>
                                                            <div className="absolute inset-0 backface-hidden rotate-y-180 flex items-center text-[9px] leading-tight text-blue-800 font-medium pr-6 bg-blue-50">
                                                                {item.def}
                                                            </div>
                                                        </div>
                                                    </div>
                                                ) : <span className="text-gray-400 italic text-sm">Arrastra una cualidad aquí</span>}
                                            </div>
                                        ))}
                                    </div>
                                    {hasWildcard && (
                                        <div className="mt-4 animate-fade-in">
                                            <label className="text-xs font-bold text-gray-500 mb-1 block">¿Cuál es tu comodín?</label>
                                            <input type="text" value={wildcardValue} onChange={(e) => setWildcardValue(e.target.value)} placeholder="Ej. Empatía"
                                                className="w-full p-3 border-2 border-blue-200 rounded-xl focus:ring-2 focus:ring-blue-600 outline-none font-bold" />
                                        </div>
                                    )}
                                    <button disabled={selections.some(s => s === null) || (hasWildcard && !wildcardValue.trim())} onClick={calculateScore}
                                        className={`mt-6 w-full py-4 rounded-xl font-black text-white shadow-lg transition-all ${selections.every(s => s !== null) ? 'bg-[#003399] hover:bg-blue-800' : 'bg-gray-400 cursor-not-allowed'}`}>
                                        Calcular Puntos
                                    </button>
                                </div>
                            </div>
                        );

                    case 4:
                        return (
                            <div className="flex flex-col items-center justify-center h-full text-center animate-fade-in">
                                <div className="bg-white p-12 rounded-3xl shadow-2xl border-2 border-blue-50 relative overflow-hidden max-w-md w-full">
                                    <IconTrophy />
                                    <h2 className="text-4xl font-black text-[#003399] mt-6 mb-2">¡Muy bien!</h2>
                                    <p className="text-gray-600 mb-8">Has completado el análisis de prioridades.</p>
                                    <div className="bg-blue-600 rounded-2xl p-6 mb-10 text-white">
                                        <span className="block text-xs uppercase tracking-widest font-bold mb-1 opacity-80">Puntaje Obtenido</span>
                                        <span className="text-7xl font-black">{score}</span>
                                    </div>
                                    <button onClick={() => setStep(5)} className="bg-[#003399] hover:bg-blue-800 text-white w-full py-4 rounded-xl font-bold transition-all transform hover:scale-105 shadow-lg">
                                        Continuar a la Parte 2
                                    </button>
                                </div>
                            </div>
                        );

                    case 5:
                        return (
                            <div className="max-w-2xl mx-auto py-10 animate-fade-in">
                                <h2 className="text-3xl font-bold text-[#003399] mb-6">Instrucciones de la segunda parte</h2>
                                <div className="bg-white p-8 rounded-2xl shadow-xl border-l-8 border-pink-500 space-y-6">
                                    <div className="flex items-start gap-4">
                                        <div className="bg-green-100 p-2 rounded-lg text-green-600"><IconCheck/></div>
                                        <p className="text-lg text-gray-700">Marca con una <strong>"palomita"</strong> las 3 que consideres tengas más desarrolladas.</p>
                                    </div>
                                    <div className="flex items-start gap-4">
                                        <div className="bg-red-100 p-2 rounded-lg text-red-600"><IconX/></div>
                                        <p className="text-lg text-gray-700">Marca con una <strong>"tacha"</strong> las 3 que consideres tengas menos desarrolladas.</p>
                                    </div>
                                    <div className="flex items-start gap-4">
                                        <div className="bg-pink-100 p-2 rounded-lg text-pink-500"><IconHeart/></div>
                                        <p className="text-lg text-gray-700 leading-tight">De las menos desarrolladas, marca con un <strong>"corazón"</strong> la que te gustaría desarrollar.</p>
                                    </div>
                                </div>
                                <div className="mt-10 flex justify-end">
                                    <button onClick={() => setStep(6)} className="bg-[#003399] text-white px-8 py-3 rounded-xl font-bold hover:bg-blue-800 shadow-md flex items-center gap-2">
                                        Continuar <IconChevronRight />
                                    </button>
                                </div>
                            </div>
                        );

                    case 6:
                        return (
                            <div className="w-full flex flex-col h-full animate-fade-in max-w-6xl">
                                <div className="flex flex-col md:flex-row gap-6 mb-6">
                                    <div className="md:w-1/2">
                                        <div className="bg-white rounded-3xl p-6 shadow-xl border border-gray-100">
                                            <h3 className="text-lg font-black text-[#003399] mb-4">Califica tus Cualidades</h3>
                                            <div className="grid grid-cols-3 gap-2">
                                                {QUALITIES.filter(q => q.id !== 'comodin').map(q => (
                                                    <div key={q.id} onDragOver={(e) => e.preventDefault()} onDrop={(e) => handleIconDrop(e, q.id)}
                                                        className={`p-2 h-20 rounded-xl border-2 flex flex-col items-center justify-between transition-all ${iconMapping[q.id] ? 'bg-blue-50 border-blue-200' : 'bg-white border-gray-50'}`}>
                                                        <span className="text-[10px] font-bold text-center leading-tight text-gray-600">{q.text}</span>
                                                        <div className="w-10 h-10 rounded-lg bg-gray-100 flex items-center justify-center">
                                                            {iconMapping[q.id] === 'check' && <IconCheck className="text-green-600" size={24} />}
                                                            {iconMapping[q.id] === 'x' && <IconX className="text-red-600" size={24} />}
                                                            {iconMapping[q.id] === 'heart' && <IconHeart className="text-pink-500" fill="#ec4899" size={24} />}
                                                        </div>
                                                    </div>
                                                ))}
                                            </div>
                                        </div>
                                    </div>

                                    <div className="md:w-1/2 flex flex-col gap-4">
                                        <div className="bg-white p-4 rounded-3xl shadow-xl">
                                            <h3 className="text-xs font-bold text-gray-400 uppercase tracking-widest mb-3">Iconos Disponibles</h3>
                                            <div className="flex justify-around bg-gray-50 p-4 rounded-2xl border border-gray-100">
                                                {['check', 'x', 'heart'].map(type => (
                                                    <div key={type} className="text-center">
                                                        <div draggable={usedIcons[type] < (type === 'heart' ? 1 : 3)} onDragStart={(e) => handleIconDragStart(e, type)}
                                                            className={`w-14 h-14 rounded-2xl flex items-center justify-center shadow-lg cursor-grab active:cursor-grabbing ${type === 'check' ? 'bg-green-500 text-white' : type === 'x' ? 'bg-red-600 text-white' : 'bg-pink-500 text-white'} ${usedIcons[type] >= (type === 'heart' ? 1 : 3) ? 'opacity-20 cursor-not-allowed' : ''}`}>
                                                            {type === 'check' ? <IconCheck size={32}/> : type === 'x' ? <IconX size={32}/> : <IconHeart size={32} fill="white"/>}
                                                        </div>
                                                        <span className="text-[10px] font-black text-gray-400 mt-2 block uppercase">{(type === 'heart' ? 1 : 3) - usedIcons[type]} Libres</span>
                                                    </div>
                                                ))}
                                            </div>
                                        </div>

                                        <div className="bg-white p-6 rounded-3xl shadow-xl space-y-4 border border-pink-50">
                                            <div>
                                                <label className="text-[10px] font-black text-pink-500 uppercase tracking-widest block mb-1">La cualidad que deseo desarrollar</label>
                                                <AutoExpandingTextarea 
                                                    value={improvementPlan.quality} 
                                                    onChange={(e) => setImprovementPlan({...improvementPlan, quality: e.target.value})}
                                                    placeholder="Coloca aquí la cualidad que desarrollarás"
                                                    className="w-full p-2 bg-pink-50 rounded-lg outline-none text-sm font-bold border-b-2 border-pink-200 focus:border-pink-500 transition-all"
                                                />
                                            </div>
                                            <div className="space-y-3">
                                                {[1, 2, 3].map(n => (
                                                    <div key={n}>
                                                        <label className="text-[10px] font-black text-blue-400 uppercase tracking-widest block">Acción {n}:</label>
                                                        <AutoExpandingTextarea 
                                                            value={improvementPlan[`action${n}`]}
                                                            onChange={(e) => setImprovementPlan({...improvementPlan, [`action${n}`]: e.target.value})}
                                                            placeholder={`Describe aquí la acción estratégica ${n}...`}
                                                            className="w-full p-1 border-b-2 border-gray-100 focus:border-blue-500 outline-none text-sm font-medium transition-all"
                                                        />
                                                    </div>
                                                ))}
                                            </div>
                                        </div>
                                    </div>
                                </div>

                                <div className="bg-[#003399] text-white p-6 rounded-3xl shadow-2xl flex flex-wrap items-center justify-between gap-6">
                                    <div className="flex flex-col gap-2">
                                        <span className="text-xs font-black opacity-60 uppercase tracking-widest">Mis 5 Prioridades:</span>
                                        <div className="flex flex-wrap gap-2">
                                            {selections.map((s, idx) => (
                                                <span key={idx} className="bg-white/10 px-4 py-1.5 rounded-full text-xs font-bold border border-white/20">
                                                    {s?.id === 'comodin' ? wildcardValue || 'Comodín' : s?.text}
                                                </span>
                                            ))}
                                        </div>
                                    </div>
                                    <div className="flex items-center gap-8">
                                        <div className="text-right">
                                            <span className="text-[10px] opacity-60 font-black uppercase tracking-widest">Puntuaje Total</span>
                                            <div className="text-4xl font-black">{score}</div>
                                        </div>
                                        <button onClick={() => setShowFinalModal(true)} className="bg-white text-[#003399] px-10 py-3 rounded-2xl font-black hover:bg-blue-50 transition-all shadow-xl text-lg">
                                            Listo
                                        </button>
                                    </div>
                                </div>

                                {showFinalModal && (
                                    <div className="fixed inset-0 bg-black/60 backdrop-blur-md flex items-center justify-center z-50 p-4">
                                        <div className="bg-white rounded-[2rem] p-10 max-w-sm w-full text-center relative shadow-2xl animate-bounce-in">
                                            <button onClick={() => setShowFinalModal(false)} className="absolute top-6 right-6 text-gray-400 hover:text-red-500 p-1"><IconX size={28}/></button>
                                            <div className="w-24 h-24 bg-blue-100 text-blue-600 rounded-full flex items-center justify-center mx-auto mb-6 shadow-inner"><IconTrophy /></div>
                                            <h2 className="text-2xl font-black text-[#003399] mb-4">¡Plan de Acción Listo!</h2>
                                            <p className="text-gray-600 mb-8 leading-relaxed font-medium">Cierra esta ventana y toma una captura de pantalla con tus resultados para tu evidencia.</p>
                                            <button onClick={() => setShowFinalModal(false)} className="w-full bg-[#003399] text-white py-4 rounded-2xl font-black hover:bg-blue-800 shadow-lg">Cerrar</button>
                                        </div>
                                    </div>
                                )}
                            </div>
                        );
                    default: return null;
                }
            };

            return (
                <div className="min-h-screen relative flex flex-col items-center p-4 md:p-8">
                    <div className="absolute inset-0 grid-bg pointer-events-none"></div>
                    <header className="w-full max-w-6xl flex justify-between items-center mb-8 relative z-10">
                        <img src={LOGO_URL} alt="TEC" className="h-10 md:h-12 object-contain" />
                        <div className="flex gap-2">
                            {[1, 2, 3, 4, 5, 6].map(i => (
                                <div key={i} className={`h-2 rounded-full transition-all duration-300 ${step === i ? 'bg-blue-600 w-10 shadow-lg' : 'bg-gray-200 w-2'}`}></div>
                            ))}
                        </div>
                    </header>
                    <main className="w-full max-w-6xl flex-grow flex items-center justify-center relative z-10">
                        {renderScreen()}
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
